<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>&#28378;&#31570;&#27927;&#34915;&#26426;</title>
    <style>
      :root {
        --ink: #36405a;
        --cloud: rgba(255, 255, 255, 0.84);
        --pink: #ff8fba;
        --peach: #ffc77d;
        --mint: #86dec9;
        --sky: #78c5ff;
        --lavender: #b5a5ff;
        --progress: 0%;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 12%, rgba(255, 255, 255, 0.72), transparent 22%),
          linear-gradient(145deg, #c6efff, #fbd7e6 58%, #dbf7ec);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: manipulation;
        user-select: none;
      }

      .app {
        position: relative;
        display: grid;
        place-items: center;
        width: 100vw;
        height: 100vh;
        min-height: 100svh;
        overflow: hidden;
      }

      .scene {
        position: relative;
        height: min(100vh, 100svh);
        aspect-ratio: 941 / 1672;
        overflow: hidden;
        background: #d8f2ff;
      }

      .frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        -webkit-user-drag: none;
        pointer-events: none;
      }

      .drum-effects {
        position: absolute;
        left: 50%;
        top: 53.35%;
        width: 31.4%;
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        overflow: hidden;
        mix-blend-mode: screen;
        pointer-events: none;
        opacity: 0.88;
      }

      .water {
        position: absolute;
        left: -22%;
        bottom: 4%;
        width: 144%;
        height: 58%;
        border-radius: 45% 42% 0 0;
        background:
          radial-gradient(circle at 32% 26%, rgba(255, 255, 255, 0.56), transparent 15%),
          linear-gradient(180deg, rgba(127, 224, 255, 0.42), rgba(72, 163, 224, 0.5));
        animation: water-slosh 1.35s ease-in-out infinite;
      }

      .water::before,
      .water::after {
        content: "";
        position: absolute;
        left: -16%;
        top: -22%;
        width: 132%;
        height: 44%;
        border-radius: 50%;
        background:
          radial-gradient(ellipse at 12% 50%, transparent 0 28%, rgba(255, 255, 255, 0.5) 29% 34%, transparent 35%),
          radial-gradient(ellipse at 38% 50%, transparent 0 28%, rgba(255, 255, 255, 0.44) 29% 34%, transparent 35%),
          radial-gradient(ellipse at 64% 50%, transparent 0 28%, rgba(255, 255, 255, 0.44) 29% 34%, transparent 35%),
          radial-gradient(ellipse at 90% 50%, transparent 0 28%, rgba(255, 255, 255, 0.5) 29% 34%, transparent 35%);
        animation: wave-run 1.1s linear infinite;
      }

      .water::after {
        top: -10%;
        opacity: 0.55;
        animation-duration: 1.55s;
        animation-direction: reverse;
      }

      .bubble-layer {
        position: absolute;
        inset: 0;
      }

      .bubble {
        position: absolute;
        left: var(--x);
        bottom: -12%;
        width: var(--s);
        aspect-ratio: 1;
        border: 2px solid rgba(255, 255, 255, 0.78);
        border-radius: 50%;
        background: radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.24) 28%, rgba(129, 226, 255, 0.2));
        opacity: 0;
        animation: bubble-rise var(--d) linear infinite;
        animation-delay: var(--delay);
      }

      .click-guide {
        position: absolute;
        left: 50%;
        top: 53.35%;
        width: 34%;
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 3;
      }

      .guide-ring {
        position: absolute;
        inset: 5%;
        border: 3px solid rgba(255, 255, 255, 0.86);
        border-radius: 50%;
        box-shadow:
          0 0 0 8px rgba(255, 143, 186, 0.12),
          0 8px 18px rgba(54, 64, 90, 0.16);
        animation: guide-pulse 1.25s ease-in-out infinite;
      }

      .guide-cursor {
        position: absolute;
        right: 3%;
        bottom: 0;
        width: 38px;
        height: 48px;
        transform: rotate(-18deg);
        animation: guide-tap 1.25s ease-in-out infinite;
      }

      .guide-cursor::before {
        content: "";
        position: absolute;
        left: 13px;
        top: 0;
        width: 14px;
        height: 30px;
        border-radius: 9px;
        background: #fff6fb;
        box-shadow:
          inset 0 0 0 2px rgba(255, 143, 186, 0.9),
          -7px 16px 0 -4px #fff6fb,
          7px 16px 0 -4px #fff6fb;
      }

      .guide-label {
        position: absolute;
        left: 50%;
        bottom: -13px;
        min-width: 74px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        color: #f05f98;
        font-size: 13px;
        font-weight: 900;
        text-align: center;
        transform: translateX(-50%);
        box-shadow: 0 8px 18px rgba(54, 64, 90, 0.14);
      }

      .hud {
        position: absolute;
        left: max(14px, env(safe-area-inset-left));
        right: max(14px, env(safe-area-inset-right));
        bottom: max(14px, env(safe-area-inset-bottom));
        display: grid;
        gap: 10px;
        z-index: 4;
      }

      .mode-panel,
      .status-panel {
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 8px;
        background: var(--cloud);
        box-shadow: 0 16px 42px rgba(74, 95, 132, 0.18);
        backdrop-filter: blur(14px);
      }

      .mode-panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px;
        padding: 9px;
      }

      .mode-button {
        position: relative;
        display: grid;
        grid-template-columns: 42px 1fr;
        align-items: center;
        gap: 8px;
        min-height: 58px;
        padding: 8px 10px;
        border: 0;
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
        font-weight: 850;
        text-align: left;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(255, 250, 253, 0.64));
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.82),
          0 8px 18px rgba(108, 127, 156, 0.12);
      }

      .mode-button.is-active {
        color: #ffffff;
        background: linear-gradient(135deg, #ff91bd, #ffc277);
      }

      .mode-button.is-active .mode-sub {
        color: rgba(255, 255, 255, 0.82);
      }

      .mode-copy {
        display: grid;
        gap: 2px;
        min-width: 0;
      }

      .mode-title {
        font-size: 14px;
        line-height: 1.1;
        white-space: nowrap;
      }

      .mode-sub {
        overflow: hidden;
        color: rgba(54, 64, 90, 0.62);
        font-size: 11px;
        font-weight: 750;
        line-height: 1.1;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cute-icon {
        position: relative;
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: inset 0 -3px 0 rgba(255, 163, 194, 0.18);
      }

      .mode-button.is-active .cute-icon {
        background: rgba(255, 255, 255, 0.94);
      }

      .tap-icon::before {
        content: "";
        position: absolute;
        width: 13px;
        height: 20px;
        border-radius: 7px 7px 5px 5px;
        background: #ffadc8;
        box-shadow:
          -8px 7px 0 -3px #ffd7a7,
          8px 7px 0 -3px #ffd7a7;
        transform: rotate(-10deg);
      }

      .tap-icon::after {
        content: "";
        position: absolute;
        right: 7px;
        top: 7px;
        width: 10px;
        height: 10px;
        border: 2px solid #8fd7ff;
        border-radius: 50%;
      }

      .phone-icon::before {
        content: "";
        position: absolute;
        width: 19px;
        height: 29px;
        border: 3px solid #8f9df8;
        border-radius: 7px;
        background: linear-gradient(180deg, #ffffff, #dff8ff);
        transform: rotate(-10deg);
      }

      .phone-icon::after {
        content: "";
        position: absolute;
        inset: 8px 4px;
        border-left: 3px solid #7edbc6;
        border-right: 3px solid #7edbc6;
        border-radius: 50%;
        opacity: 0.9;
        animation: shake-waves 900ms ease-in-out infinite;
      }

      .status-panel {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .status-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 14px;
        font-weight: 850;
      }

      .state {
        min-width: 66px;
        color: #f05f98;
        text-align: right;
      }

      .progress-track {
        height: 12px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.68);
      }

      .progress-fill {
        width: var(--progress);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--mint), var(--sky), var(--pink));
        transition: width 150ms ease;
      }

      .hint {
        min-height: 18px;
        color: rgba(54, 64, 90, 0.72);
        font-size: 13px;
        line-height: 1.35;
      }

      .action-button {
        display: none;
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        background: linear-gradient(135deg, #89dcca, #8fc9ff);
        color: #ffffff;
        font: inherit;
        font-weight: 850;
      }

      .action-button.is-visible {
        display: block;
      }

      .tap-ripple {
        position: absolute;
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.82);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: ripple 520ms ease-out forwards;
        pointer-events: none;
        z-index: 3;
      }

      body[data-state="bubble"] .drum-effects {
        opacity: 1;
        filter: saturate(1.28);
      }

      body[data-mode="shake"] .click-guide,
      body.has-interacted .click-guide,
      body[data-state="bubble"] .click-guide {
        display: none;
      }

      @keyframes water-slosh {
        0%,
        100% {
          transform: translateX(-2%) rotate(-7deg);
        }
        50% {
          transform: translateX(3%) rotate(7deg);
        }
      }

      @keyframes wave-run {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(18%);
        }
      }

      @keyframes bubble-rise {
        0% {
          transform: translateY(0) scale(0.72);
          opacity: 0;
        }
        16% {
          opacity: 0.85;
        }
        86% {
          opacity: 0.65;
        }
        100% {
          transform: translateY(-132%) translateX(var(--drift)) scale(1.08);
          opacity: 0;
        }
      }

      @keyframes ripple {
        to {
          width: 96px;
          height: 96px;
          opacity: 0;
        }
      }

      @keyframes shake-waves {
        0%,
        100% {
          transform: scaleX(0.78);
          opacity: 0.5;
        }
        50% {
          transform: scaleX(1);
          opacity: 1;
        }
      }

      @keyframes guide-pulse {
        0%,
        100% {
          transform: scale(0.94);
          opacity: 0.72;
        }
        50% {
          transform: scale(1.04);
          opacity: 1;
        }
      }

      @keyframes guide-tap {
        0%,
        100% {
          transform: translate(0, 0) rotate(-18deg);
        }
        50% {
          transform: translate(-8px, -9px) rotate(-18deg);
        }
      }

      @media (min-width: 760px) {
        .scene {
          height: min(100vh, 920px);
          box-shadow: 0 28px 80px rgba(77, 91, 125, 0.22);
        }

        .hud {
          left: 50%;
          right: auto;
          width: min(430px, calc(100vw - 32px));
          transform: translateX(-50%);
        }
      }
    </style>
  </head>
  <body data-mode="tap" data-state="washing">
    <main class="app" aria-label="washer interaction">
      <section class="scene" id="scene" aria-label="laundry room">
        <img class="frame" id="frame" src="./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025925_104_1501.png" alt="" draggable="false">
        <div class="drum-effects" aria-hidden="true">
          <div class="water"></div>
          <div class="bubble-layer" id="bubbleLayer"></div>
        </div>
        <div class="click-guide" aria-hidden="true">
          <span class="guide-ring"></span>
          <span class="guide-cursor"></span>
          <span class="guide-label">&#28857;&#36825;&#37324;</span>
        </div>
      </section>

      <div class="hud">
        <div class="mode-panel" aria-label="mode selector">
          <button class="mode-button is-active" id="tapMode" type="button">
            <span class="cute-icon tap-icon" aria-hidden="true"></span>
            <span class="mode-copy">
              <span class="mode-title">&#28857;&#20987;&#27169;&#24335;</span>
              <span class="mode-sub">&#36731;&#36731;&#28857;&#19968;&#28857;</span>
            </span>
          </button>
          <button class="mode-button" id="shakeMode" type="button">
            <span class="cute-icon phone-icon" aria-hidden="true"></span>
            <span class="mode-copy">
              <span class="mode-title">&#25671;&#25163;&#26426;</span>
              <span class="mode-sub">&#25671;&#19968;&#25671;&#21152;&#36895;</span>
            </span>
          </button>
        </div>

        <div class="status-panel">
          <div class="status-line">
            <span id="statusText"></span>
            <span class="state" id="stateText">washing</span>
          </div>
          <div class="progress-track" aria-label="progress">
            <div class="progress-fill"></div>
          </div>
          <div class="hint" id="hintText"></div>
          <button class="action-button" id="startMotion" type="button">&#24320;&#22987;&#25671;&#25163;&#26426;</button>
          <button class="action-button" id="doneState" type="button">bubble</button>
        </div>
      </div>
    </main>

    <script>
      const text = {
        tapStatus: "\u70b9\u51fb\u6d17\u8863\u673a\u6eda\u7b52\uff0c\u8ba9\u5b83\u8d8a\u8f6c\u8d8a\u5feb",
        tapHint: "\u6eda\u7b52\u4f1a\u5148\u81ea\u5df1\u8f7b\u8f7b\u8f6c\uff0c\u70b9\u4e2d\u95f4\u5706\u7a97\u4f1a\u7d2f\u8ba1\u8fdb\u5ea6\u3002",
        shakeIdle: "\u5148\u542f\u52a8\u4f20\u611f\u5668\uff0c\u518d\u6447\u6643\u624b\u673a",
        shakeActive: "\u6447\u6643\u624b\u673a\uff0c\u8ba9\u6eda\u7b52\u52a0\u901f",
        shakeHint: "\u624b\u673a\u6d4f\u89c8\u5668\u53ef\u80fd\u4f1a\u5f39\u51fa\u52a8\u4f5c\u4f20\u611f\u5668\u6388\u6743\uff0c\u8bf7\u9009\u62e9\u5141\u8bb8\u3002",
        shakeRunningHint: "\u6447\u5f97\u8d8a\u660e\u663e\uff0c\u6eda\u7b52\u8d8a\u5feb\uff0c\u8fdb\u5ea6\u4e5f\u4f1a\u6da8\u5f97\u8d8a\u5feb\u3002",
        denied: "\u672a\u83b7\u5f97\u4f20\u611f\u5668\u6743\u9650\uff0c\u53ef\u4ee5\u5207\u56de\u70b9\u51fb\u6a21\u5f0f\u7ee7\u7eed\u3002",
        noMotion: "\u6ca1\u6709\u8bfb\u5230\u52a8\u4f5c\u4f20\u611f\u5668\u6570\u636e\uff0c\u8bf7\u6362\u6d4f\u89c8\u5668\u6216\u4f7f\u7528\u70b9\u51fb\u6a21\u5f0f\u3002",
        unsupported: "\u5f53\u524d\u6d4f\u89c8\u5668\u6ca1\u6709\u5f00\u653e\u52a8\u4f5c\u4f20\u611f\u5668\uff0c\u8bf7\u4f7f\u7528\u70b9\u51fb\u6a21\u5f0f\u3002",
        completeStatus: "\u6d17\u597d\u5566\uff0c\u8fdb\u5165\u6ce1\u6ce1\u72b6\u6001",
        completeHint: "\u72b6\u6001\u5df2\u5207\u6362\u5230 bubble\u3002"
      };

      const frames = [
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025925_104_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025927_105_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025928_106_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025929_107_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025931_108_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025932_109_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025934_110_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025935_111_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025937_112_1501.png",
        "./assets/drum_frames/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20260607025938_113_1501.png"
      ];

      const body = document.body;
      const scene = document.querySelector("#scene");
      const frame = document.querySelector("#frame");
      const bubbleLayer = document.querySelector("#bubbleLayer");
      const tapMode = document.querySelector("#tapMode");
      const shakeMode = document.querySelector("#shakeMode");
      const startMotion = document.querySelector("#startMotion");
      const doneState = document.querySelector("#doneState");
      const statusText = document.querySelector("#statusText");
      const stateText = document.querySelector("#stateText");
      const hintText = document.querySelector("#hintText");

      let mode = "tap";
      let progress = 0;
      const idleSpeed = 2.8;
      let speed = idleSpeed;
      let frameIndex = 0;
      let frameCarry = 0;
      let lastTime = performance.now();
      let motionActive = false;
      let lastShake = null;
      let dragging = false;

      function preloadFrames() {
        frames.forEach((src) => {
          const image = new Image();
          image.src = src;
        });
      }

      function buildBubbles() {
        for (let index = 0; index < 22; index += 1) {
          const bubble = document.createElement("span");
          bubble.className = "bubble";
          bubble.style.setProperty("--x", `${8 + Math.random() * 78}%`);
          bubble.style.setProperty("--s", `${7 + Math.random() * 19}px`);
          bubble.style.setProperty("--d", `${1.2 + Math.random() * 1.7}s`);
          bubble.style.setProperty("--delay", `${Math.random() * -2.6}s`);
          bubble.style.setProperty("--drift", `${(Math.random() - 0.5) * 34}px`);
          bubbleLayer.append(bubble);
        }
      }

      function setMode(nextMode) {
        mode = nextMode;
        body.dataset.mode = mode;
        tapMode.classList.toggle("is-active", mode === "tap");
        shakeMode.classList.toggle("is-active", mode === "shake");
        startMotion.classList.toggle("is-visible", mode === "shake" && !motionActive && progress < 100);

        if (mode === "tap") {
          statusText.textContent = text.tapStatus;
          hintText.textContent = text.tapHint;
        } else {
          statusText.textContent = motionActive ? text.shakeActive : text.shakeIdle;
          hintText.textContent = motionActive ? text.shakeRunningHint : text.shakeHint;
        }
      }

      function addProgress(amount) {
        if (progress >= 100) return;
        progress = Math.min(100, progress + amount);
        speed = Math.min(18, speed + amount * 0.2);
        document.documentElement.style.setProperty("--progress", `${progress}%`);

        if (progress >= 100) {
          complete();
        }
      }

      function complete() {
        body.dataset.state = "bubble";
        stateText.textContent = "bubble";
        statusText.textContent = text.completeStatus;
        hintText.textContent = text.completeHint;
        startMotion.classList.remove("is-visible");
        doneState.classList.add("is-visible");
        speed = 12;

        const detail = {
          state: "receipt",
          stage: "washing_machine",
          completed: 1,
          total: 1,
          mode,
          progress
        };

        window.dispatchEvent(new CustomEvent("receipt", { detail }));
        if (typeof window.onWashingComplete === "function") {
          window.onWashingComplete(detail);
        }
      }

      function addRipple(event) {
        const ripple = document.createElement("span");
        const rect = scene.getBoundingClientRect();
        ripple.className = "tap-ripple";
        ripple.style.left = `${event.clientX - rect.left}px`;
        ripple.style.top = `${event.clientY - rect.top}px`;
        scene.append(ripple);
        window.setTimeout(() => ripple.remove(), 560);
      }

      function handleTap(event) {
        if (mode !== "tap" || progress >= 100) return;
        body.classList.add("has-interacted");
        addRipple(event);
        addProgress(event.type === "pointermove" ? 0.8 : 4.2);
      }

      async function startMotionMode() {
        setMode("shake");
        try {
          if (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") {
            const permission = await DeviceMotionEvent.requestPermission();
            if (permission !== "granted") {
              hintText.textContent = text.denied;
              return;
            }
          }

          window.addEventListener("devicemotion", handleMotion, { passive: true });
          motionActive = true;
          lastShake = null;
          statusText.textContent = text.shakeActive;
          hintText.textContent = text.shakeRunningHint;
          startMotion.classList.remove("is-visible");
        } catch (error) {
          hintText.textContent = text.unsupported;
        }
      }

      function handleMotion(event) {
        if (mode !== "shake" || progress >= 100) return;

        const source = event.accelerationIncludingGravity || event.acceleration;
        if (!source) {
          hintText.textContent = text.noMotion;
          return;
        }

        const current = {
          x: source.x || 0,
          y: source.y || 0,
          z: source.z || 0
        };

        if (!lastShake) {
          lastShake = current;
          return;
        }

        const delta =
          Math.abs(current.x - lastShake.x) +
          Math.abs(current.y - lastShake.y) +
          Math.abs(current.z - lastShake.z);

        lastShake = current;

        if (delta > 6.2) {
          addProgress(Math.min(5.8, (delta - 5.8) * 0.58));
        }
      }

      function animate(now) {
        const delta = Math.min(64, now - lastTime);
        lastTime = now;

        speed = Math.max(progress >= 100 ? 9 : idleSpeed, speed - delta * 0.0024);
        frameCarry += (delta / 1000) * speed;

        if (frameCarry >= 1) {
          const steps = Math.floor(frameCarry);
          frameCarry -= steps;
          frameIndex = (frameIndex + steps) % frames.length;
          frame.src = frames[frameIndex];
        }

        requestAnimationFrame(animate);
      }

      scene.addEventListener("pointerdown", (event) => {
        dragging = true;
        handleTap(event);
      });
      scene.addEventListener("pointermove", (event) => {
        if (dragging) handleTap(event);
      });
      scene.addEventListener("pointerup", () => {
        dragging = false;
      });
      scene.addEventListener("pointercancel", () => {
        dragging = false;
      });

      tapMode.addEventListener("click", () => setMode("tap"));
      shakeMode.addEventListener("click", () => setMode("shake"));
      startMotion.addEventListener("click", startMotionMode);

      preloadFrames();
      buildBubbles();
      setMode("tap");
      requestAnimationFrame(animate);
    </script>
  </body>
</html>
